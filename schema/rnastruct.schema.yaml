id: https://example.org/rnastruct
name: rnastruct
prefixes:
  linkml: https://w3id.org/linkml/
  rnastruct: https://example.org/rnastruct/
default_prefix: rnastruct
default_range: string
imports:
  - linkml:types

classes:
  Dataset:
    tree_root: true
    attributes:
      dataset_id:
        required: true
        pattern: "^rnastruct\\d+$"
      organism:
        required: true
        range: Organism
      data_type:
        required: true
        range: DataType
      publication:
        required: true
        range: Publication
      raw_data:
        required: true
        range: RawData

  Organism:
    attributes:
      name:
        required: true
        # Basic scientific-name shape (capitalized genus + species epithet).
        pattern: "^[A-Z][a-z]+( [a-z][a-z-]+)+$"
      cell_lines:
        multivalued: true

  DataType:
    attributes:
      method:
        required: true
        # Allow method names such as icSHAPE, SHAPE-MaP, DMS-MaPseq, etc.
        pattern: "(?i)^.*(SHAPE|DMS).*$"
      chemical:
        required: true
      context:
        required: true
        range: ContextEnum
        multivalued: true
      principle:
        required: true
        range: PrincipleEnum
      conditions:
        multivalued: true
      replicates_per_condition:
        range: integer

  Publication:
    attributes:
      doi:
        required: true
        # DOI format validation (existence check requires online lookup).
        pattern: "^10\\.\\d{4,9}/[-._;()/:A-Za-z0-9]+$"
      year:
        range: integer

  RawData:
    attributes:
      repository:
        required: true
        range: RepositoryEnum
      accession:
        required: true
        # Broad accession pattern supported by nf-core/fetchngs.
        pattern: "^(((SR|ER|DR)[APRSX])|(SAM(N|EA|D))|(PRJ(NA|EB|DB))|(GS[EM]))(\\d+)$"
      landing_page:
        range: uri
      run_accessions:
        multivalued: true
        # Run-level accessions across SRA/ENA/DDBJ.
        pattern: "^(SRR|ERR|DRR)\\d+$"

enums:
  PrincipleEnum:
    permissible_values:
      RT-stop:
      MaP:

  ContextEnum:
    permissible_values:
      in_vivo:
      in_vitro:
      ex_vivo:

  RepositoryEnum:
    permissible_values:
      SRA:
      ENA:
      GEO:
      DDBJ:
