name: Validate Metadata

on:
  pull_request:
    paths:
      - "SHAPE/*.yaml"
      - "DMS/*.yaml"
      - "schema/*.yaml"
      - "scripts/*.py"
      - "tests/*.py"
      - "requirements.txt"
      - "pyproject.toml"
      - ".github/workflows/validate-metadata.yml"
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine YAML files to validate
        id: changed-yamls
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "pull_request" ]]; then
            base_ref="origin/${{ github.base_ref }}"
            mapfile -t yaml_files < <(git diff --name-only "${base_ref}"...HEAD -- SHAPE DMS | grep -E '\.ya?ml$' || true)
          else
            mapfile -t yaml_files < <(find SHAPE DMS -maxdepth 1 -type f \( -name '*.yaml' -o -name '*.yml' \) | sort)
          fi

          if [[ ${#yaml_files[@]} -eq 0 ]]; then
            echo "has_files=false" >> "${GITHUB_OUTPUT}"
            echo "No YAML files to validate."
            exit 0
          fi

          printf '%s\n' "${yaml_files[@]}" > changed_yamls.txt
          echo "has_files=true" >> "${GITHUB_OUTPUT}"
          echo "files<<EOF" >> "${GITHUB_OUTPUT}"
          cat changed_yamls.txt >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"
          echo "Will validate:"
          cat changed_yamls.txt

      - name: Validate schema
        if: steps.changed-yamls.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r yaml_file; do
            [[ -n "${yaml_file}" ]] || continue
            echo "Validating schema: ${yaml_file}"
            linkml-validate --schema schema/rnastruct.schema.yaml "${yaml_file}"
          done < changed_yamls.txt

      - name: Validate uniqueness across metadata files
        shell: bash
        run: |
          set -euo pipefail
          python scripts/check_metadata_uniqueness.py
