id: https://example.org/rnastruct
name: rnastruct
prefixes:
  linkml: https://w3id.org/linkml/
  rnastruct: https://example.org/rnastruct/
default_prefix: rnastruct
default_range: string
imports:
  - linkml:types

classes:
  Dataset:
    tree_root: true
    attributes:
      dataset_id:
        required: true
        pattern: "^rnastruct\\d{5}$"
      organism:
        required: true
        range: Organism
      experiment:
        required: true
        range: Experiment
      publication:
        required: true
        range: Publication
      raw_data:
        required: true
        range: RawData

  Organism:
    attributes:
      name:
        required: true
      genome_build:
        required: true
        range: string

  Experiment:
    attributes:
      method:
        required: true
        # Allow method names such as icSHAPE, SHAPE-MaP, DMS-MaPseq, etc.
        pattern: "(?i)^.*(SHAPE|DMS).*$"
      obi:
        range: string
      chemical:
        range: Chemical
      context:
        range: ContextEnum
        multivalued: true
      principle:
        required: true
        range: PrincipleEnum
      reverse_transcriptase:
        range: string
      pH:
        range: float
      adapter_3p:
        range: string
      adapter_5p:
        range: string
      umi_pattern:
        range: string

  Chemical:
    attributes:
      name:
        required: true
        range: string
      concentration:
        range: string

  Publication:
    attributes:
      doi:
        required: true
        # DOI format validation (existence check requires online lookup).
        pattern: "^10\\.\\d{4,9}/[-._;()/:A-Za-z0-9]+$"
      year:
        range: integer

  RawData:
    attributes:
      repository:
        required: true
        range: RepositoryEnum
      accession:
        required: true
        # Broad accession pattern supported by nf-core/fetchngs.
        pattern: "^(((SR|ER|DR)[APRSX])|(SAM(N|EA|D))|(PRJ(NA|EB|DB))|(GS[EM]))(\\d+)$"
      landing_page:
        range: uri
      run_accessions:
        required: true
        multivalued: true
        range: RunAccessionName
        description: Required list of accession-to-sample mappings.

  RunAccessionName:
    attributes:
      accession:
        required: true
        # Accepted accession IDs (run/sample/experiment/study/project forms used by fetchngs metadata).
        pattern: "^(((SR|ER|DR)R)|(GS[EM])|((SR|ER|DR)X)|((SR|ER|DR)S)|(SAM(N|EA|D))|((SR|ER|DR)P)|((SR|ER|DR)A)|(PRJ(NA|EB|DB)))(\\d+)$"
      sample_name:
        required: true
        range: string
      cell_line:
        required: true
        range: string
      condition:
        required: true
        range: ConditionEnum
      replicate:
        required: true
        range: integer

enums:
  PrincipleEnum:
    permissible_values:
      RT-stop:
      MaP:

  ContextEnum:
    permissible_values:
      in_vivo:
      in_vitro:
      ex_vivo:

  ConditionEnum:
    permissible_values:
      treated:
      untreated:
      denatured:

  RepositoryEnum:
    permissible_values:
      SRA:
      ENA:
      GEO:
      DDBJ:
