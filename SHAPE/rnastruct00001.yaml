dataset_id: rnastruct00001

organism:
  name: Homo sapiens
  cell_lines: [HEK293T, K562, HeLa, HepG2, H9]
  genome_build: hg38

experiment:
  method: icSHAPE
  OBI: OBI:0001026
  chemical: 
    name: NAI-N3
    concentration: 100 mM
  principle: RT-stop
  reverse_transcriptase: superScript III
  pH: 7.5
  context: [in_vivo]
  conditions: [untreated, treated]
  replicates_per_condition: 1
  adapter_3p: AGATCGGAAGAGCACACGTCT
  adapter_5p: null  # varies by sample; set when known
  umi_pattern: DDDNNNNNNNNNN  # D=A/G/T, N=A/C/G/T

publication:
  doi: 10.1038/s41422-021-00476-y
  year: 2021

raw_data:
  repository: GEO
  accession: GSE145805
  landing_page: https://www.ncbi.nlm.nih.gov/geo/query/acc.cgi?acc=GSE145805
  # Each entry requires accession + sample_name. 
  # The sample name should be biologically meaningful and should distinguish differences between the samples in the dataset.
  run_accessions:
    - accession: GSM4333255
      sample_name: HEK293T_untreated
    - accession: GSM4333256
      sample_name: HEK293T_treated
    - accession: GSM4333257
      sample_name: HeLa_untreated
    - accession: GSM4333258
      sample_name: HeLa_treated
    - accession: GSM4333259
      sample_name: K562_untreated
    - accession: GSM4333260
      sample_name: K562_treated
    - accession: GSM4333261
      sample_name: HepG2_untreated
    - accession: GSM4333262
      sample_name: HepG2_treated
    - accession: GSM4333263
      sample_name: H9_untreated
    - accession: GSM4333264
      sample_name: H9_treated
